# Nginx config for Kamiab Prokashon
# Place at: /etc/nginx/sites-available/kamiabprokashon.xyz
# Enable: ln -s /etc/nginx/sites-available/kamiabprokashon.xyz /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d kamiabprokashon.xyz -d www.kamiabprokashon.xyz -d api.kamiabprokashon.xyz

# Rate limiting zone — shared across workers
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=order_limit:10m rate=5r/m;

# ── API server ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.kamiabprokashon.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.kamiabprokashon.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.kamiabprokashon.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kamiabprokashon.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tighten rate limit on order endpoints
    location ~* ^/api/(orders|landing/.+/order) {
        limit_req zone=order_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3091;
        include /etc/nginx/proxy_params;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3091;
        include /etc/nginx/proxy_params;
    }

    # Increase body limit for Cloudinary uploads
    client_max_body_size 20M;

    access_log /var/log/nginx/kamiab-api-access.log;
    error_log  /var/log/nginx/kamiab-api-error.log;
}

# ── Web (Next.js) ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name kamiabprokashon.xyz www.kamiabprokashon.xyz;
    return 301 https://kamiabprokashon.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.kamiabprokashon.xyz;

    ssl_certificate     /etc/letsencrypt/live/kamiabprokashon.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kamiabprokashon.xyz/privkey.pem;
    return 301 https://kamiabprokashon.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kamiabprokashon.xyz;

    ssl_certificate     /etc/letsencrypt/live/kamiabprokashon.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kamiabprokashon.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3060;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/proxy_params;
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://127.0.0.1:3060;
        include /etc/nginx/proxy_params;
    }

    # Public static files
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3060;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:3060;
        include /etc/nginx/proxy_params;
    }

    client_max_body_size 5M;

    access_log /var/log/nginx/kamiab-web-access.log;
    error_log  /var/log/nginx/kamiab-web-error.log;
}
