name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd ${{ secrets.VPS_APP_DIR }}
            bash deploy.sh

# Secrets needed (repo → Settings → Secrets and variables → Actions):
#   VPS_HOST     -> VPS IP
#   VPS_USER     -> CloudPanel site user (NOT root — the user that owns htdocs)
#   VPS_SSH_KEY  -> private key whose public key is in the site user's authorized_keys
#   VPS_PORT     -> 22
#   VPS_APP_DIR  -> /home/<site-user>/htdocs/sodaikini.com
